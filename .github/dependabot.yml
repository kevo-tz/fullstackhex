version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
    open-pull-requests-limit: 5

  - package-ecosystem: "cargo"
    directory: "/backend"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:10"
    open-pull-requests-limit: 5
    groups:
      rust-patch:
        patterns:
          - "*"
        update-types:
          - "patch"

  - package-ecosystem: "pip"
    directory: "/python-sidecar"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:20"
    open-pull-requests-limit: 5
    groups:
      python-patch:
        patterns:
          - "*"
        update-types:
          - "patch"

  - package-ecosystem: "npm"
    directory: "/frontend"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:30"
    open-pull-requests-limit: 5
    groups:
      frontend-patch:
        patterns:
          - "*"
        update-types:
          - "patch"

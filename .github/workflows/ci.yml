name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  rust:
    name: Rust (fmt / clippy / test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v6

      - name: Setup Python 3.14
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Bootstrap generated workspace when missing
        run: |
          if [ ! -d backend ] || [ ! -d python-sidecar ] || [ ! -d frontend ]; then
            chmod +x scripts/install.sh
            ./scripts/install.sh
          fi

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache Cargo registry and build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            backend/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('backend/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: cargo fmt
        run: cargo fmt --all -- --check

      - name: cargo clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: cargo test
        run: cargo test --workspace

  python:
    name: Python (ruff / pytest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: python-sidecar

    steps:
      - uses: actions/checkout@v6

      - name: Setup Python 3.14
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Bootstrap generated workspace when missing
        run: |
          if [ ! -d backend ] || [ ! -d python-sidecar ] || [ ! -d frontend ]; then
            chmod +x scripts/install.sh
            ./scripts/install.sh
          fi

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Install dependencies
        run: uv sync --all-extras

      - name: ruff lint
        run: uv run ruff check .

      - name: ruff format check
        run: uv run ruff format --check .

      - name: pytest
        run: uv run pytest

  frontend:
    name: Frontend (lint / test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v6

      - name: Setup Python 3.14
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Bootstrap generated workspace when missing
        run: |
          if [ ! -d backend ] || [ ! -d python-sidecar ] || [ ! -d frontend ]; then
            chmod +x scripts/install.sh
            ./scripts/install.sh
          fi

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Cache Bun modules
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          # bun.lockb (Bun <1.1) or bun.lock (Bun >=1.1)
          key: ${{ runner.os }}-bun-${{ hashFiles('frontend/bun.lockb', 'frontend/bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint
        run: bun run lint

      - name: Type check
        run: bun run typecheck

      - name: Test
        run: bun test

      - name: Build
        run: bun run build

  generated-smoke:
    name: Generated Template Smoke Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Setup Python 3.14
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Generate project scaffold
        run: |
          chmod +x scripts/install.sh
          ./scripts/install.sh

      - name: Rust generated smoke
        working-directory: backend
        run: cargo test --workspace

      - name: Python generated smoke
        working-directory: python-sidecar
        run: |
          uv sync --all-extras
          uv run pytest

      - name: Frontend generated smoke
        working-directory: frontend
        run: bun test

  security:
    name: Security (gitleaks + detect-secrets)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Setup Python 3.14
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Verify detect-secrets baseline
        run: |
          python -m pip install --upgrade pip
          pip install detect-secrets==1.5.0
          git ls-files -z | xargs -0 detect-secrets-hook --baseline .secrets.baseline

      - name: Run gitleaks scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          config-path: gitleaks.toml

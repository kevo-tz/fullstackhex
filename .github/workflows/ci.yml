name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  rust:
    name: rust
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: testdb
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v6

      - name: Install system dependencies
        run: sudo apt-get update -qq && sudo apt-get install -y -qq libssl-dev

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache Cargo registry and build
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            backend/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('backend/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: cargo fmt
        run: cargo fmt --all -- --check

      - name: cargo clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Setup Python for socket integration tests
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0

      - name: Start Python sidecar for socket tests
        run: |
          cd ../python-sidecar
          uv sync --all-extras
          uv run uvicorn app.main:app --uds /tmp/fullstackhex-python.sock &
          for i in $(seq 1 20); do
            test -S /tmp/fullstackhex-python.sock && break
            sleep 0.5
          done
          echo "Python sidecar started"

      - name: cargo test
        env:
          DATABASE_URL: postgres://postgres:postgres@localhost:5432/testdb
          PYTHON_SIDECAR_SOCKET: /tmp/fullstackhex-python.sock
        run: cargo test --workspace

  python:
    name: python
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: python-sidecar

    steps:
      - uses: actions/checkout@v6

      - name: Setup Python 3.14
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0

      - name: Install dependencies
        run: uv sync --all-extras

      - name: ruff lint
        run: uv run ruff check .

      - name: ruff format check
        run: uv run ruff format --check .

      - name: pytest
        run: uv run pytest

  frontend:
    name: frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js 22
        uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Cache Bun modules
        uses: actions/cache@v5
        with:
          path: ~/.bun/install/cache
          # bun.lockb (Bun <1.1) or bun.lock (Bun >=1.1)
          key: ${{ runner.os }}-bun-${{ hashFiles('frontend/bun.lockb', 'frontend/bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint
        run: bun run lint

      - name: Type check
        run: bun run typecheck

      - name: Test (bun)
        run: bun test

      - name: Test (vitest)
        run: bun run test:vitest

      - name: Build
        env:
          VITE_RUST_BACKEND_URL: http://localhost:8001
        run: bun run build

  smoke:
    name: smoke
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0

      - name: Setup Node.js 22
        uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Rust smoke
        working-directory: backend
        run: cargo test --workspace

      - name: Python smoke
        working-directory: python-sidecar
        run: |
          uv sync --all-extras
          uv run pytest

      - name: Frontend smoke
        working-directory: frontend
        run: bun test

  infra:
    name: infra
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Validate dev compose config
        env:
          POSTGRES_PASSWORD: dummy_password_for_validation  # pragma: allowlist secret
          RUSTFS_ACCESS_KEY: dummy_access_key
          RUSTFS_SECRET_KEY: dummy_secret_key  # pragma: allowlist secret
        run: docker compose -f compose/dev.yml config

      - name: Validate prod compose config
        env:
          POSTGRES_PASSWORD: dummy_password_for_validation  # pragma: allowlist secret
          POSTGRES_USER: app_user
          POSTGRES_DB: app_database
          DATABASE_URL: postgres://app_user:dummy@localhost:5432/app_database  # pragma: allowlist secret
          REDIS_URL: redis://localhost:6379
          REDIS_PASSWORD: dummy_password  # pragma: allowlist secret
          RUSTFS_ENDPOINT: http://localhost:9000
          RUSTFS_ACCESS_KEY: dummy_access_key
          RUSTFS_SECRET_KEY: dummy_secret_key  # pragma: allowlist secret
          RUSTFS_CORS_ORIGINS: "*"
          GRAFANA_ADMIN_PASSWORD: dummy_password  # pragma: allowlist secret
        run: docker compose -f compose/prod.yml config

      - name: Validate monitor compose config
        env:
          GRAFANA_ADMIN_PASSWORD: dummy_password  # pragma: allowlist secret
          POSTGRES_USER: app_user
          POSTGRES_PASSWORD: dummy_password  # pragma: allowlist secret
          POSTGRES_DB: app_database
          REDIS_PASSWORD: dummy_password  # pragma: allowlist secret
        run: docker compose -f compose/monitor.yml config

      - name: Validate Grafana dashboard JSON
        run: |
          for f in monitoring/grafana/dashboards/*.json; do
            jq empty "$f" || { echo "Invalid JSON: $f"; exit 1; }
          done

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Verify Dockerfile.rust builds
        uses: docker/build-push-action@v7
        with:
          file: compose/Dockerfile.rust
          context: .
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Performance regression check (non-blocking)
        continue-on-error: true
        run: |
          if [ -f benches/baseline/baseline.json ]; then
            ./scripts/bench.sh --compare || true
          else
            echo "No baseline found — skipping comparison"
          fi

  security:
    name: security
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Python 3.14
        run: |
          python -m pip install --upgrade pip
          pip install detect-secrets==1.5.0 # pragma: allowlist secret
          # Collect known-audited secret hashes from the committed baseline.
          KNOWN=$(python3 -c "
          import json
          with open('.github/.secrets.baseline') as f:
              b = json.load(f)
          hashes = {s['hashed_secret'] for v in b.get('results',{}).values() for s in v}
          print(' '.join(hashes))
          ")
          # Run a fresh scan (stdout only, does not modify baseline).
          detect-secrets scan $(git ls-files | grep -v '^.github/.secrets.baseline$') \
            > /tmp/fresh-baseline.json
          # Fail if any secret hash in the fresh scan is not in the known set.
          python3 -c "
          import json, sys
          with open('/tmp/fresh-baseline.json') as f:
              fresh = json.load(f)
          known = set('$KNOWN'.split())
          new = [
              (path, s['line_number'], s['type'])
              for path, secrets in fresh.get('results', {}).items()
              for s in secrets
              if s['hashed_secret'] not in known
          ]
          if new:
              for path, ln, t in new:
                  print(f'NEW SECRET: {path}:{ln} ({t})', file=sys.stderr)
              sys.exit(1)
          print(f'detect-secrets: no new secrets ({len(known)} known findings audited)')
          "

      - name: Run gitleaks scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }} # pragma: allowlist secret
          GITLEAKS_CONFIG: .github/gitleaks.toml

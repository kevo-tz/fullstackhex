name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  rust:
    name: rust
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache Cargo registry and build
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            backend/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('backend/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: cargo fmt
        run: cargo fmt --all -- --check

      - name: cargo clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: cargo test
        run: cargo test --workspace

  python:
    name: python
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: python-sidecar

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0

      - name: Install dependencies
        run: uv sync --all-extras

      - name: ruff lint
        run: uv run ruff check .

      - name: ruff format check
        run: uv run ruff format --check .

      - name: pytest
        run: uv run pytest

  frontend:
    name: frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Cache Bun modules
        uses: actions/cache@v5
        with:
          path: ~/.bun/install/cache
          # bun.lockb (Bun <1.1) or bun.lock (Bun >=1.1)
          key: ${{ runner.os }}-bun-${{ hashFiles('frontend/bun.lockb', 'frontend/bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint
        run: bun run lint

      - name: Type check
        run: bun run typecheck

      - name: Test
        run: bun test

      - name: Build
        env:
          VITE_RUST_BACKEND_URL: http://localhost:8001
        run: bun run build

  smoke:
    name: smoke
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Rust smoke
        working-directory: backend
        run: cargo test --workspace

      - name: Python smoke
        working-directory: python-sidecar
        run: |
          uv sync --all-extras
          uv run pytest

      - name: Frontend smoke
        working-directory: frontend
        run: bun test

  security:
    name: security
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: detect-secrets scan
        run: |
          python -m pip install --upgrade pip
          pip install detect-secrets==1.5.0 # pragma: allowlist secret
          # Collect known-audited secret hashes from the committed baseline.
          KNOWN=$(python3 -c "
          import json
          with open('.github/.secrets.baseline') as f:
              b = json.load(f)
          hashes = {s['hashed_secret'] for v in b.get('results',{}).values() for s in v}
          print(' '.join(hashes))
          ")
          # Run a fresh scan (stdout only, does not modify baseline).
          detect-secrets scan $(git ls-files | grep -v '^.github/.secrets.baseline$') \
            > /tmp/fresh-baseline.json
          # Fail if any secret hash in the fresh scan is not in the known set.
          python3 -c "
          import json, sys
          with open('/tmp/fresh-baseline.json') as f:
              fresh = json.load(f)
          known = set('$KNOWN'.split())
          new = [
              (path, s['line_number'], s['type'])
              for path, secrets in fresh.get('results', {}).items()
              for s in secrets
              if s['hashed_secret'] not in known
          ]
          if new:
              for path, ln, t in new:
                  print(f'NEW SECRET: {path}:{ln} ({t})', file=sys.stderr)
              sys.exit(1)
          print(f'detect-secrets: no new secrets ({len(known)} known findings audited)')
          "

      - name: Run gitleaks scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }} # pragma: allowlist secret
          GITLEAKS_CONFIG: .github/gitleaks.toml

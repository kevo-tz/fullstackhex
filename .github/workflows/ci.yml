name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  rust:
    name: rust
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: testdb
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:8-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6

      - name: Install system dependencies
        run: sudo apt-get update -qq && sudo apt-get install -y -qq libssl-dev

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8  # stable
        with:
          components: rustfmt, clippy

      - name: Cache Cargo registry, bins and build
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae  # v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            ~/.cargo/bin
            backend/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('backend/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: cargo fmt
        run: cargo fmt --all -- --check

      - name: cargo clippy
        run: cargo clippy --locked --all-targets --all-features -- -D warnings

      - name: Install sqlx-cli
        run: cargo install sqlx-cli --version 0.8.6 --locked --force 2>&1 | tail -5

      - name: Check sqlx offline metadata
        run: cargo sqlx prepare --workspace --check -- --all-features

      - name: Run database migrations
        env:
          DATABASE_URL: postgres://postgres:postgres@localhost:5432/testdb
        run: cargo sqlx migrate run --source db/migrations

      - name: cargo test
        env:
          DATABASE_URL: postgres://postgres:postgres@localhost:5432/testdb
          REDIS_URL: redis://localhost:6379
          RATE_LIMIT_REGISTER_MAX: 50
          RATE_LIMIT_LOGIN_IP_MAX: 50
          RATE_LIMIT_LOGIN_EMAIL_MAX: 50
          RATE_LIMIT_FORGOT_MAX: 20
          RATE_LIMIT_FORGOT_WINDOW: 10
          RATE_LIMIT_OAUTH_CALLBACK_MAX: 20
          RATE_LIMIT_OAUTH_CALLBACK_WINDOW: 10
        run: cargo test --locked --workspace -- --test-threads=1

  python:
    name: python
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: py-api

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6

      - name: Setup Python 3.14
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6
        with:
          python-version: "3.14"

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39  # v8.2.0

      - name: Cache uv dependencies
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae  # v5.0.5
        with:
          path: ~/.cache/uv
          key: uv-${{ runner.os }}-${{ hashFiles('py-api/pyproject.toml') }}
          restore-keys: uv-${{ runner.os }}-

      - name: Install dependencies
        run: uv sync --all-extras

      - name: ruff lint
        run: uv run ruff check .

      - name: ruff format check
        run: uv run ruff format --check .

      - name: pytest
        run: uv run pytest

  frontend:
    name: frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6

      - name: Setup Node.js 22
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6
        with:
          node-version: "22"

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6  # v2

      - name: Cache Bun modules
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae  # v5
        with:
          path: ~/.bun/install/cache
          # bun.lockb (Bun <1.1) or bun.lock (Bun >=1.1)
          key: ${{ runner.os }}-bun-${{ hashFiles('frontend/bun.lockb', 'frontend/bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint
        run: bun run lint

      - name: Type check
        run: bun run typecheck

      - name: Test
        run: bun run test

      - name: Build
        env:
          VITE_RUST_BACKEND_URL: http://localhost:8001
        run: bun run build

  e2e:
    name: e2e
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: testdb
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:8-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8  # stable

      - name: Setup Node.js 22
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6
        with:
          node-version: "22"

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6  # v2

      - name: Cache Cargo registry and build
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae  # v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            backend/target
          key: ${{ runner.os }}-cargo-e2e-${{ hashFiles('backend/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-e2e-
            ${{ runner.os }}-cargo-

      - name: Build backend
        working-directory: backend
        run: cargo build --locked -p api

      - name: Start backend
        env:
          DATABASE_URL: postgres://postgres:postgres@localhost:5432/testdb
          REDIS_URL: redis://localhost:6379
          JWT_SECRET: dummy_jwt_secret_for_e2e_tests
          AUTH_MODE: both
          COOKIE_SECURE: "false"
          RUSTFS_ENDPOINT: ""
          PYTHON_SIDECAR_SOCKET: ""
          RATE_LIMIT_REGISTER_MAX: 20
          RATE_LIMIT_LOGIN_IP_MAX: 50
        working-directory: backend
        run: |
          cargo run --locked -p api &
          for i in $(seq 1 60); do
            curl -s http://localhost:8001/health && break
            sleep 1
          done
          echo "Backend ready"

      - name: Validate WebSocket upgrade
        run: |
          # Register a test user (email includes timestamp to avoid conflicts across runs)
          ts=$(date +%s)
          resp=$(curl -s -X POST http://localhost:8001/auth/register \
            -H "Content-Type: application/json" \
            -d "{\"email\":\"ws-ci-${ts}@test.local\",\"password\":\"test-pw-12345\",\"name\":\"WSCi\"}")
          # Login to get a session cookie (cookie-only WS auth, no ?token=)
          cookie_jar=$(mktemp)
          http_code=$(curl -s -o /dev/null -w '%{http_code}' \
            -c "$cookie_jar" \
            -X POST http://localhost:8001/auth/login \
            -H "Content-Type: application/json" \
            -d "{\"email\":\"ws-ci-${ts}@test.local\",\"password\":\"test-pw-12345\"}")
          if [ "$http_code" != "200" ]; then
            echo "Login failed with status $http_code"
            exit 1
          fi
          if ! grep -q "session" "$cookie_jar"; then
            echo "No session cookie received"
            exit 1
          fi
          # Validate WS upgrade with the session cookie
          status=$(curl -s -o /dev/null -w '%{http_code}' \
            -b "$cookie_jar" \
            -H "Upgrade: websocket" \
            -H "Connection: Upgrade" \
            -H "Sec-WebSocket-Key: dGhlIHNhbXBsZSBub25jZQ==" \
            -H "Sec-WebSocket-Version: 13" \
            "http://localhost:8001/live")
          if [ "$status" = "101" ]; then
            echo "✓ WebSocket upgrade successful (101)"
          else
            echo "✗ Expected 101, got $status"
            exit 1
          fi

      - name: Install frontend deps
        working-directory: frontend
        run: bun install --frozen-lockfile

      - name: Start frontend
        working-directory: frontend
        env:
          VITE_RUST_BACKEND_URL: http://localhost:8001
        run: |
          bun run dev &
          for i in $(seq 1 30); do
            curl -s http://localhost:4321 && break
            sleep 1
          done
          echo "Frontend ready"

      - name: Run e2e tests (vitest)
        working-directory: frontend
        env:
          VITE_RUST_BACKEND_URL: http://localhost:8001
          FRONTEND_URL: http://localhost:4321
        run: |
          bun run test:e2e

      - name: Install Playwright browsers
        working-directory: frontend
        run: |
          npx playwright install --with-deps chromium

      - name: Run e2e tests (Playwright)
        working-directory: frontend
        env:
          FRONTEND_URL: http://localhost:4321
          COOKIE_SECURE: "false"
        run: |
          bun run test:e2e:playwright

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

  infra:
    name: infra
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6

      - name: Validate dev compose config
        env:
          POSTGRES_PASSWORD: dummy_password_for_validation  # pragma: allowlist secret
          RUSTFS_ACCESS_KEY: dummy_access_key
          RUSTFS_SECRET_KEY: dummy_secret_key  # pragma: allowlist secret
          REDIS_PASSWORD: dummy_password  # pragma: allowlist secret
        run: docker compose -f compose/dev.yml config

      - name: Validate prod compose config
        env:
          POSTGRES_PASSWORD: dummy_password_for_validation  # pragma: allowlist secret
          POSTGRES_USER: app_user
          POSTGRES_DB: app_database
          DATABASE_URL: postgres://app_user:dummy@localhost:5432/app_database  # pragma: allowlist secret
          REDIS_URL: redis://localhost:6379
          REDIS_PASSWORD: dummy_password  # pragma: allowlist secret
          RUSTFS_ENDPOINT: http://localhost:9000
          RUSTFS_ACCESS_KEY: dummy_access_key
          RUSTFS_SECRET_KEY: dummy_secret_key  # pragma: allowlist secret
          RUSTFS_CORS_ORIGINS: "*"
          GRAFANA_ADMIN_PASSWORD: dummy_password  # pragma: allowlist secret
        run: docker compose -f compose/prod.yml config

      - name: Validate monitor compose config
        env:
          GRAFANA_ADMIN_PASSWORD: dummy_password  # pragma: allowlist secret
          POSTGRES_USER: app_user
          POSTGRES_PASSWORD: dummy_password  # pragma: allowlist secret
          POSTGRES_DB: app_database
          REDIS_PASSWORD: dummy_password  # pragma: allowlist secret
        run: docker compose -f compose/monitor.yml config

      - name: Validate Grafana dashboard JSON
        run: |
          for f in compose/monitoring/grafana/dashboards/*.json; do
            jq empty "$f" || { echo "Invalid JSON: $f"; exit 1; }
          done

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5  # v4

      - name: Verify Dockerfile.rust builds
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf  # v7
        with:
          file: compose/Dockerfile.rust
          context: .
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Performance regression check (non-blocking)
        continue-on-error: true
        run: |
          if [ -f benches/baseline/baseline.json ]; then
            ./scripts/bench.sh --compare || true
          else
            echo "No baseline found — skipping comparison"
          fi

  security:
    name: security
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6
        with:
          fetch-depth: 0

      - name: Setup Python 3.14
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6
        with:
          python-version: "3.14"

      - name: Install detect-secrets
        run: |
          python -m pip install --upgrade pip
          pip install detect-secrets==1.5.0 # pragma: allowlist secret
          # Collect known-audited secret hashes from the committed baseline.
          KNOWN=$(python3 -c "
          import json
          with open('.github/.secrets.baseline') as f:
              b = json.load(f)
          hashes = {s['hashed_secret'] for v in b.get('results',{}).values() for s in v}
          print(' '.join(hashes))
          ")
          # Run a fresh scan (stdout only, does not modify baseline).
          detect-secrets scan $(git ls-files | grep -v '^.github/.secrets.baseline$') \
            > /tmp/fresh-baseline.json
          # Fail if any secret hash in the fresh scan is not in the known set.
          python3 -c "
          import json, sys
          with open('/tmp/fresh-baseline.json') as f:
              fresh = json.load(f)
          known = set('$KNOWN'.split())
          new = [
              (path, s['line_number'], s['type'])
              for path, secrets in fresh.get('results', {}).items()
              for s in secrets
              if s['hashed_secret'] not in known
          ]
          if new:
              for path, ln, t in new:
                  print(f'NEW SECRET: {path}:{ln} ({t})', file=sys.stderr)
              sys.exit(1)
          print(f'detect-secrets: no new secrets ({len(known)} known findings audited)')
          "

      - name: Run gitleaks scan
        uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7  # v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }} # pragma: allowlist secret
          GITLEAKS_CONFIG: .github/gitleaks.toml

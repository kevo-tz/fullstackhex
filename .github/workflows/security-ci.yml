name: Security CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  schedule:
    - cron: "0 6 * * 1"  # every Monday 06:00 UTC

jobs:
  cargo-deny:
    name: cargo-deny
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
      - uses: EmbarkStudios/cargo-deny-action@08e5a8d80d50e9cb549a2a6c6f57a9a5e96c710e  # v2
        with:
          command: check advisories
          arguments: --manifest-path backend/Cargo.toml

  pip-audit:
    name: pip-audit
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: py-api
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
      - name: Setup Python 3.14
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6
        with:
          python-version: "3.14"
      - name: Install pip-audit
        run: python -m pip install pip-audit
      - name: Run pip-audit
        run: python -m pip_audit --strict --requirement pyproject.toml

  eslint-security:
    name: eslint-security
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
      - name: Setup Node.js 22
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6
        with:
          node-version: "22"
      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6  # v2
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Lint
        run: bunx eslint .

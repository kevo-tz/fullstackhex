# Development Infrastructure for FullStackHex
# Usage: docker compose -f compose/dev.yml up -d
#
# Prerequisites: copy .env.example to .env and replace all CHANGE_ME values
#
# Services:
#   - postgres:18-alpine  (port 5432) - Primary database
#   - redis:8-alpine      (port 6379) - Cache layer
#   - rustfs/rustfs:0.8.1 (ports 9000, 9001) - S3-compatible object storage
#
# Networks: fullstackhex-network (bridge)
# Volumes: postgres_data, redis_data, rustfs_data (persistent)

networks:
  fullstackhex-network:
    name: fullstackhex-network
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  rustfs_data:
    driver: local

services:
  postgres:
    image: postgres:18-alpine
    container_name: fullstackhex_db
    restart: unless-stopped
    ports:
      - "127.0.0.1:${POSTGRES_PORT:-5432}:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-app_user}
      # POSTGRES_PASSWORD must be set in .env — no default is intentional
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set in .env}
      POSTGRES_DB: ${POSTGRES_DB:-app_database}
      # Tune for development (not production)
      POSTGRES_INITDB_ARGS: "--encoding=UTF-8 --locale=C"
    volumes:
      - postgres_data:/var/lib/postgresql
      # Optional: mount init scripts
      # - ./scripts/db/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-app_user} -d ${POSTGRES_DB:-app_database}" ]  # user/db defaults are non-sensitive
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 512M
    networks:
      - fullstackhex-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  redis:
    image: redis:8-alpine
    container_name: fullstackhex_redis
    restart: unless-stopped
    ports:
      - "127.0.0.1:${REDIS_PORT:-6379}:6379"
    command: >
      redis-server --maxmemory ${REDIS_MAX_MEMORY:-512mb} --maxmemory-policy ${REDIS_MAXMEMORY_POLICY:-allkeys-lru} --appendonly ${REDIS_APPENDONLY:-yes} --save ${REDIS_SAVE:-900 1 300 10 60 10000} --requirepass ${REDIS_PASSWORD:?REDIS_PASSWORD must be set in .env}
    volumes:
      - redis_data:/data
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 512M
    networks:
      - fullstackhex-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  rustfs:
    image: rustfs/rustfs:0.8.1
    container_name: fullstackhex_rustfs
    restart: unless-stopped
    ports:
      - "127.0.0.1:${RUSTFS_API_PORT:-9000}:9000"
      - "127.0.0.1:${RUSTFS_CONSOLE_PORT:-9001}:9001"
    environment:
      # RustFS configuration
      RUSTFS_VOLUMES: /data
      RUSTFS_ADDRESS: 0.0.0.0:9000
      RUSTFS_CONSOLE_ADDRESS: 0.0.0.0:9001
      RUSTFS_CONSOLE_ENABLE: "true"
      RUSTFS_CORS_ALLOWED_ORIGINS: ${RUSTFS_CORS_ORIGINS:-*}
      RUSTFS_CONSOLE_CORS_ALLOWED_ORIGINS: ${RUSTFS_CORS_ORIGINS:-*}
      # Credentials must be set in .env — no defaults are intentional
      RUSTFS_ACCESS_KEY: ${RUSTFS_ACCESS_KEY:?RUSTFS_ACCESS_KEY must be set in .env}
      RUSTFS_SECRET_KEY: ${RUSTFS_SECRET_KEY:?RUSTFS_SECRET_KEY must be set in .env}
      # Enable browser access
      RUSTFS_BROWSER: "on"
    volumes:
      - rustfs_data:/data
    healthcheck:
      test: [ "CMD", "sh", "-c", "curl -f http://127.0.0.1:9000/health && curl -f http://127.0.0.1:9001/rustfs/console/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 512M
    networks:
      - fullstackhex-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  adminer:
    image: adminer:5.1.0
    container_name: fullstackhex_adminer
    restart: unless-stopped
    ports:
      - "127.0.0.1:${ADMINER_PORT:-8080}:8080"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080"]
      interval: 30s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 512M
    networks:
      - fullstackhex-network
    profiles:
      - tools

  redis-commander:
    image: rediscommander/redis-commander:0.8.0
    container_name: fullstackhex_redis_commander
    restart: unless-stopped
    ports:
      - "127.0.0.1:${REDIS_COMMANDER_PORT:-8081}:8081"
    environment:
      REDIS_HOSTS: local:fullstackhex_redis:6379:0:${REDIS_PASSWORD:?REDIS_PASSWORD must be set in .env}
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8081"]
      interval: 30s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 512M
    networks:
      - fullstackhex-network
    profiles:
      - tools

  redis-exporter:
    image: oliver006/redis_exporter:v1.67.0
    container_name: fullstackhex_redis_exporter
    restart: unless-stopped
    ports:
      - "127.0.0.1:${REDIS_EXPORTER_PORT:-9121}:9121"
    environment:
      REDIS_ADDR: "redis://fullstackhex_redis:6379"
      REDIS_PASSWORD: ${REDIS_PASSWORD:?REDIS_PASSWORD must be set in .env}
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:9121/-/healthy"]
      interval: 30s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 512M
    networks:
      - fullstackhex-network

  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:v0.16.0
    container_name: fullstackhex_postgres_exporter
    restart: unless-stopped
    ports:
      - "127.0.0.1:${POSTGRES_EXPORTER_PORT:-9187}:9187"
    environment:
      # Use individual vars to avoid shell injection if password contains special chars
      DATA_SOURCE_USER: ${POSTGRES_USER:-app_user}
      DATA_SOURCE_PASS: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}
      DATA_SOURCE_HOST: fullstackhex_db
      DATA_SOURCE_PORT: "5432"
      DATA_SOURCE_DB: ${POSTGRES_DB:-app_database}
      DATA_SOURCE_SSLMODE: disable
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:9187/-/healthy"]
      interval: 30s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 512M
    networks:
      - fullstackhex-network

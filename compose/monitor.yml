# Monitoring stack for FullStackHex
# Usage: docker compose -f compose/monitor.yml up -d
# Note: joins the existing fullstackhex-network from app compose files.

networks:
  fullstackhex-network:
    external: true
    name: fullstackhex-network

volumes:
  prometheus_data:
    driver: local
  grafana_data:
    driver: local

services:
  prometheus:
    image: prom/prometheus:v3.3.1
    container_name: fullstackhex_prometheus
    restart: unless-stopped
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=15d"
    extra_hosts:
      - "backend:host-gateway"
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 512M
    networks:
      - fullstackhex-network
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:9090/-/healthy"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  grafana:
    image: grafana/grafana:11.2.0
    container_name: fullstackhex_grafana
    restart: unless-stopped
    ports:
      - "${GRAFANA_PORT:-3000}:3000"
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:?GRAFANA_ADMIN_PASSWORD must be set in .env}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_SERVER_DOMAIN: ${GRAFANA_DOMAIN:-localhost}
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      prometheus:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 512M
    networks:
      - fullstackhex-network
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s

  alertmanager:
    image: prom/alertmanager:v0.28.0
    container_name: fullstackhex_alertmanager
    restart: unless-stopped
    ports:
      - "${ALERTMANAGER_PORT:-9093}:9093"
    volumes:
      - ./monitoring/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
    command:
      - "--config.file=/etc/alertmanager/alertmanager.yml"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:9093/-/healthy"]
      interval: 30s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 512M
    networks:
      - fullstackhex-network

  node-exporter:
    image: prom/node-exporter:v1.9.0
    container_name: fullstackhex_node_exporter
    restart: unless-stopped
    ports:
      - "${NODE_EXPORTER_PORT:-9100}:9100"
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/host/rootfs:ro
    command:
      - "--path.rootfs=/host/rootfs"
      - "--path.procfs=/host/proc"
      - "--path.sysfs=/host/sys"
      - "--collector.filesystem.mount-points-exclude=^/(dev|proc|sys|host)($$|/)"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:9100/-/healthy"]
      interval: 30s
      timeout: 5s
      retries: 3
    networks:
      - fullstackhex-network
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 64M

  redis-exporter:
    image: oliver006/redis_exporter:v1.67.0
    container_name: fullstackhex_redis_exporter_mon
    restart: unless-stopped
    expose:
      - "9121"
    environment:
      REDIS_ADDR: "redis://fullstackhex_redis:6379"
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    networks:
      - fullstackhex-network
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 64M

  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:v0.16.0
    container_name: fullstackhex_postgres_exporter_mon
    restart: unless-stopped
    expose:
      - "9187"
    environment:
      # Use individual vars to avoid shell injection if password contains special chars
      DATA_SOURCE_USER: ${POSTGRES_USER:?POSTGRES_USER must be set}
      DATA_SOURCE_PASS: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}
      DATA_SOURCE_HOST: fullstackhex_db
      DATA_SOURCE_PORT: "5432"
      DATA_SOURCE_DB: ${POSTGRES_DB:-app_database}
      DATA_SOURCE_SSLMODE: disable
    networks:
      - fullstackhex-network
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 64M

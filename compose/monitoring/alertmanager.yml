
global:
  # smtp_smarthost: 'localhost:587'
  # smtp_from: 'alerts@example.com'
  # slack_api_url: 'https://hooks.slack.com/services/T00/B00/xxxxx'

route:
  group_by: ['alertname', 'severity']
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h
  receiver: 'dev'

routes:
  - match:
      severity: critical
    receiver: 'dev'
    continue: true

receivers:
  # Dev receiver: logs alerts to stdout via a local health-check endpoint.
  # Production teams should replace this with Slack, PagerDuty, or email.
  - name: 'dev'
    webhook_configs:
      - url: 'http://localhost:5001/alerts'
        send_resolved: true

  # ── Production receivers (uncomment and configure) ──
  #
  # - name: 'slack-critical'
  #   slack_configs:
  #     - api_url: 'https://hooks.slack.com/services/T00/B00/xxxxx'
  #       channel: '#alerts'
  #       send_resolved: true
  #       title: '{{ .GroupLabels.alertname }}'
  #       text: '{{ .CommonAnnotations.description }}'
  #
  # - name: 'pagerduty-critical'
  #   pagerduty_configs:
  #     - routing_key: 'YOUR_PD_INTEGRATION_KEY'
  #       severity: 'critical'
  #       send_resolved: true

inhibit_rules:
  - source_match:
      severity: 'critical'
    target_match:
      severity: 'warning'
    equal: ['alertname']
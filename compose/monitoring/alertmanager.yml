# Alertmanager configuration for FullStackHex
# Receives alerts from Prometheus and routes them to notification channels.
#
# Teams should add their own Slack, PagerDuty, or email receivers.
# Set SLACK_WEBHOOK_URL, PAGERDUTY_SERVICE_KEY, or SMTP settings
# in .env to enable real notification routing.

global:
  # smtp_smarthost: 'localhost:587'
  # smtp_from: 'alerts@example.com'

route:
  group_by: ['alertname', 'severity']
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h
  receiver: 'default'
  routes:
    - match:
        severity: critical
      receiver: 'default'
      continue: true

receivers:
  - name: 'default'
    webhook_configs:
      - url: 'http://localhost:5001/alerts'
        send_resolved: true
    # Slack example — set SLACK_WEBHOOK_URL in .env
    # slack_configs:
    #   - api_url: '${SLACK_WEBHOOK_URL}'
    #     channel: '#alerts'
    #     send_resolved: true
    # PagerDuty example — set PAGERDUTY_SERVICE_KEY in .env
    # pagerduty_configs:
    #   - service_key: '${PAGERDUTY_SERVICE_KEY}'
    #     send_resolved: true

inhibit_rules:
  - source_match:
      severity: 'critical'
    target_match:
      severity: 'warning'
    equal: ['alertname']
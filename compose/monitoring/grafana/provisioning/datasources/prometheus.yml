
apiVersion: 1

datasources:
  - name: Prometheus
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true
    editable: true
    # Optional: configure alerting
    jsonData:
      timeInterval: '5s'
      queryTimeout: '30s'
      httpMethod: 'POST'
    # Optional: secure data (API keys, etc.)
    # secureJsonData:
    #   apiKey: ''

# Nginx canary routing — splits traffic between primary and canary backends.
# Change the percentage and reload nginx to adjust canary weight.

split_clients "$request_uri" $backend_upstream {
    ${CANARY_WEIGHT}%    canary_backend;
    *      primary_backend;
}

upstream primary_backend {
    server backend:8001;
}

upstream canary_backend {
    server backend-canary:8001;
}

upstream frontend {
    server frontend:4321;
}

server {
    listen 80;
    server_name _;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    server_name _;

    ssl_certificate /etc/nginx/certs/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    location /api/ {
        proxy_pass http://$backend_upstream/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    location /health {
        proxy_pass http://$backend_upstream/health;
        proxy_set_header Host $host;
    }

    location /metrics {
        proxy_pass http://$backend_upstream/metrics;
        proxy_set_header Host $host;
        allow 172.20.0.0/16;
        deny all;
    }

    location /stub_status {
        stub_status on;
        allow 172.20.0.0/16;
        deny all;
    }

    location / {
        proxy_pass http://frontend/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

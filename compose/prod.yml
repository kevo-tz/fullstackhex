# Production Infrastructure for FullStackHex
# Usage: docker compose -f compose/prod.yml up -d
#
# Prerequisites:
#   - Copy .env.example to .env and set all required values (no CHANGE_ME left)
#   - TLS certificates in nginx/certs/ (fullchain.pem and privkey.pem)
#
# Services:
#   - nginx          (ports 80, 443)  - Reverse proxy + TLS termination
#   - backend        (internal :8001) - Rust/Axum API server
#   - python-sidecar (internal socket) - Python FastAPI sidecar (managed by Rust)
#   - frontend       (internal :4321) - Astro SSR Node server
#   - postgres       (internal :5432) - Primary database
#   - redis          (internal :6379) - Cache layer
#   - rustfs         (internal :9000) - S3-compatible object storage

networks:
  fullstackhex-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  rustfs_data:
    driver: local
  sidecar_socket:
    driver: local

services:
  nginx:
    image: nginx:alpine
    container_name: fullstackhex_nginx
    restart: unless-stopped
    ports:
      - "${NGINX_PORT:-80}:80"
      - "${HTTPS_PORT:-443}:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_healthy
    networks:
      - fullstackhex-network
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 128M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  backend:
    build:
      context: ..
      dockerfile: compose/Dockerfile.rust
    image: fullstackhex/backend:${VERSION:-latest}
    container_name: fullstackhex_rust
    restart: unless-stopped
    expose:
      - "8001"
    environment:
      RUST_LOG: ${RUST_LOG:-info}
      DATABASE_URL: ${DATABASE_URL:?DATABASE_URL must be set in .env}
      REDIS_URL: ${REDIS_URL:?REDIS_URL must be set in .env}
      RUSTFS_ENDPOINT: ${RUSTFS_ENDPOINT:?RUSTFS_ENDPOINT must be set in .env}
      RUSTFS_ACCESS_KEY: ${RUSTFS_ACCESS_KEY:?RUSTFS_ACCESS_KEY must be set in .env}
      RUSTFS_SECRET_KEY: ${RUSTFS_SECRET_KEY:?RUSTFS_SECRET_KEY must be set in .env}
      PYTHON_SIDECAR_SOCKET: /tmp/sidecar/python-sidecar.sock
    volumes:
      - sidecar_socket:/tmp/sidecar
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      python-sidecar:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - fullstackhex-network
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 512M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  python-sidecar:
    build:
      context: ..
      dockerfile: compose/Dockerfile.python
    image: fullstackhex/python-sidecar:${VERSION:-latest}
    container_name: fullstackhex_python
    restart: unless-stopped
    environment:
      PYTHON_LOG_LEVEL: ${PYTHON_LOG_LEVEL:-info}
      PYTHON_SIDECAR_SOCKET: /tmp/sidecar/python-sidecar.sock
    volumes:
      - sidecar_socket:/tmp/sidecar
    # No depends_on backend: Python binds the socket (server); Rust connects (client).
    # Python must be up before Rust attempts to connect.
    networks:
      - fullstackhex-network
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 256M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  frontend:
    build:
      context: ..
      dockerfile: compose/Dockerfile.frontend
      args:
        PUBLIC_API_URL: ${PUBLIC_API_URL:-https://api.example.com}
    image: fullstackhex/frontend:${VERSION:-latest}
    container_name: fullstackhex_frontend
    restart: unless-stopped
    expose:
      - "4321"
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:4321/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - fullstackhex-network
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 128M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  postgres:
    image: postgres:18-alpine
    container_name: fullstackhex_db
    restart: unless-stopped
    expose:
      - "5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:?POSTGRES_USER must be set in .env}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set in .env}
      POSTGRES_DB: ${POSTGRES_DB:?POSTGRES_DB must be set in .env}
      POSTGRES_INITDB_ARGS: "--encoding=UTF-8 --locale=C"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - fullstackhex-network
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  redis:
    image: redis:8-alpine
    container_name: fullstackhex_redis
    restart: unless-stopped
    expose:
      - "6379"
    command: >
      redis-server
      --maxmemory ${REDIS_MAX_MEMORY:-512mb}
      --maxmemory-policy ${REDIS_MAXMEMORY_POLICY:-allkeys-lru}
      --appendonly ${REDIS_APPENDONLY:-yes}
      --save ${REDIS_SAVE:-900 1 300 10 60 10000}
      --requirepass ${REDIS_PASSWORD:?REDIS_PASSWORD must be set in .env}
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s
    networks:
      - fullstackhex-network
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  rustfs:
    image: rustfs/rustfs:latest
    container_name: fullstackhex_rustfs
    restart: unless-stopped
    expose:
      - "9000"
      - "9001"
    environment:
      RUSTFS_VOLUMES: /data
      RUSTFS_ADDRESS: 0.0.0.0:9000
      RUSTFS_CONSOLE_ADDRESS: 0.0.0.0:9001
      RUSTFS_CONSOLE_ENABLE: "true"
      RUSTFS_CORS_ORIGINS: ${RUSTFS_CORS_ORIGINS:?RUSTFS_CORS_ORIGINS must be set in .env}
      RUSTFS_CONSOLE_CORS_ORIGINS: ${RUSTFS_CORS_ORIGINS}
      RUSTFS_ACCESS_KEY: ${RUSTFS_ACCESS_KEY:?RUSTFS_ACCESS_KEY must be set in .env}
      RUSTFS_SECRET_KEY: ${RUSTFS_SECRET_KEY:?RUSTFS_SECRET_KEY must be set in .env}
      RUSTFS_BROWSER: "off"
    volumes:
      - rustfs_data:/data
    healthcheck:
      test: ["CMD", "sh", "-c", "curl -f http://127.0.0.1:9000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    networks:
      - fullstackhex-network
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 256M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

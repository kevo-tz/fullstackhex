# Services:
#   - nginx          (ports 80, 443)  - Reverse proxy + TLS termination
#   - backend        (internal :8001) - Rust/Axum API server
#   - py-api        (internal socket) - Python FastAPI sidecar (managed by Rust)
#   - frontend       (internal :4321) - Astro SSR Node server
#   - postgres       (internal :5432) - Primary database
#   - redis          (internal :6379) - Cache layer
#   - rustfs         (internal :9000) - S3-compatible object storage

networks:
  fullstackhex-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  rustfs_data:
    driver: local
  sidecar_socket:
    driver: local

services:
  nginx:
    image: nginx:1.31-alpine
    user: "101"
    container_name: fullstackhex_nginx
    restart: unless-stopped
    ports:
      - "${NGINX_PORT:-80}:80"
      - "${HTTPS_PORT:-443}:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
      - ./nginx/certbot-data:/var/www/certbot:ro
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_healthy
    networks:
      - fullstackhex-network
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 128M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  backend:
    build:
      context: ..
      dockerfile: compose/Dockerfile.rust
    image: fullstackhex/backend:${VERSION:-latest}
    container_name: fullstackhex_rust
    restart: unless-stopped
    expose:
      - "8001"
    environment:
      RUST_LOG: ${RUST_LOG:-info}
      DATABASE_URL: ${DATABASE_URL:?DATABASE_URL must be set in .env}
      REDIS_URL: ${REDIS_URL:?REDIS_URL must be set in .env}
      RUSTFS_ENDPOINT: ${RUSTFS_ENDPOINT:?RUSTFS_ENDPOINT must be set in .env}
      RUSTFS_ACCESS_KEY: ${RUSTFS_ACCESS_KEY:?RUSTFS_ACCESS_KEY must be set in .env}
      RUSTFS_SECRET_KEY: ${RUSTFS_SECRET_KEY:?RUSTFS_SECRET_KEY must be set in .env}
      PYTHON_SIDECAR_SOCKET: /tmp/sidecar/py-api.sock
    volumes:
      - sidecar_socket:/tmp/sidecar
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rustfs:
        condition: service_healthy
      py-api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - fullstackhex-network
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 512M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  py-api:
    build:
      context: ..
      dockerfile: compose/Dockerfile.python
    image: fullstackhex/py-api:${VERSION:-latest}
    container_name: fullstackhex_py_api
    restart: unless-stopped
    environment:
      PYTHON_LOG_LEVEL: ${PYTHON_LOG_LEVEL:-info}
      PYTHON_SIDECAR_SOCKET: /tmp/sidecar/py-api.sock
      SIDECAR_SHARED_SECRET: ${SIDECAR_SHARED_SECRET}
    volumes:
      - sidecar_socket:/tmp/sidecar
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rustfs:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "test -S /tmp/sidecar/py-api.sock"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s
    networks:
      - fullstackhex-network
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 256M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  frontend:
    build:
      context: ..
      dockerfile: compose/Dockerfile.frontend
      args:
        PUBLIC_API_URL: ${PUBLIC_API_URL:-https://api.example.com}
    image: fullstackhex/frontend:${VERSION:-latest}
    container_name: fullstackhex_frontend
    restart: unless-stopped
    expose:
      - "4321"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:4321/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - fullstackhex-network
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 128M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  postgres:
    image: postgres:18-alpine
    container_name: fullstackhex_db
    restart: unless-stopped
    expose:
      - "5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:?POSTGRES_USER must be set in .env}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set in .env}
      POSTGRES_DB: ${POSTGRES_DB:?POSTGRES_DB must be set in .env}
      POSTGRES_INITDB_ARGS: "--encoding=UTF-8 --locale=C"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - fullstackhex-network
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  redis:
    image: redis:8-alpine
    container_name: fullstackhex_redis
    restart: unless-stopped
    expose:
      - "6379"
    command: >
      redis-server
      --maxmemory ${REDIS_MAX_MEMORY:-512mb}
      --maxmemory-policy ${REDIS_MAXMEMORY_POLICY:-allkeys-lru}
      --appendonly ${REDIS_APPENDONLY:-yes}
      --save 900 1
      --save 300 10
      --save 60 10000
      --requirepass ${REDIS_PASSWORD:?REDIS_PASSWORD must be set in .env}
    volumes:
      - redis_data:/data
    environment:
      REDISCLI_AUTH: ${REDIS_PASSWORD}
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s
    networks:
      - fullstackhex-network
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  rustfs:
    image: rustfs/rustfs:v1.0.0
    container_name: fullstackhex_rustfs
    restart: unless-stopped
    expose:
      - "9000"
      - "9001"
    environment:
      RUSTFS_VOLUMES: /data
      RUSTFS_ADDRESS: 0.0.0.0:9000
      RUSTFS_CONSOLE_ADDRESS: 0.0.0.0:9001
      RUSTFS_CONSOLE_ENABLE: "true"
      RUSTFS_CORS_ORIGINS: ${RUSTFS_CORS_ORIGINS:?RUSTFS_CORS_ORIGINS must be set in .env}
      RUSTFS_CONSOLE_CORS_ORIGINS: ${RUSTFS_CORS_ORIGINS}
      RUSTFS_ACCESS_KEY: ${RUSTFS_ACCESS_KEY:?RUSTFS_ACCESS_KEY must be set in .env}
      RUSTFS_SECRET_KEY: ${RUSTFS_SECRET_KEY:?RUSTFS_SECRET_KEY must be set in .env}
      RUSTFS_BROWSER: "off"
    volumes:
      - rustfs_data:/data
    healthcheck:
      test: ["CMD", "sh", "-c", "curl -f http://127.0.0.1:9000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    networks:
      - fullstackhex-network
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 256M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  redis-exporter:
    image: oliver006/redis_exporter:v1.83.0
    container_name: fullstackhex_redis_exporter
    restart: unless-stopped
    expose:
      - "9121"
    environment:
      REDIS_ADDR: "redis://fullstackhex_redis:6379"
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - fullstackhex-network
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 64M

  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:v0.19.1
    container_name: fullstackhex_postgres_exporter
    restart: unless-stopped
    expose:
      - "9187"
    environment:
      # Use individual vars to avoid shell injection if password contains special chars
      DATA_SOURCE_USER: ${POSTGRES_USER:?POSTGRES_USER must be set}
      DATA_SOURCE_PASS: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}
      DATA_SOURCE_HOST: fullstackhex_db
      DATA_SOURCE_PORT: "5432"
      DATA_SOURCE_DB: ${POSTGRES_DB:-app_database}
      DATA_SOURCE_SSLMODE: disable
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - fullstackhex-network
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 64M

  nginx-exporter:
    image: nginx/nginx-prometheus-exporter:1.5.1
    container_name: fullstackhex_nginx_exporter
    restart: unless-stopped
    expose:
      - "9113"
    command:
      - "-nginx.scrape-uri=http://fullstackhex_nginx:80/stub_status"
    depends_on:
      nginx:
        condition: service_started
    networks:
      - fullstackhex-network
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 64M

  certbot:
    image: certbot/certbot:v5.6.0
    container_name: fullstackhex_certbot
    restart: unless-stopped
    volumes:
      - ./nginx/certs:/etc/letsencrypt
      - ./nginx/certbot-data:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew --webroot -w /var/www/certbot; sleep 12h; done'"
    depends_on:
      nginx:
        condition: service_started
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 128M
    networks:
      - fullstackhex-network

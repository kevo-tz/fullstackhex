version: '3.9'

include:
  - docker-compose.dev.yml

services:
  rust-backend:
    build:
      context: ./rust-backend
      dockerfile: Dockerfile
    container_name: bare_metal_rust
    ports:
      - "8001:8001"
    environment:
      DATABASE_URL: postgres://app_user:app_pass@postgres:5432/app_database
      REDIS_URL: redis://redis:6379
      RUST_LOG: info
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 1G

  python-services:
    build:
      context: ./python-services
      dockerfile: Dockerfile
    container_name: bare_metal_python
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgres://app_user:app_pass@postgres:5432/app_database
      REDIS_URL: redis://redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1G

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: bare_metal_frontend
    ports:
      - "3001:3001"
    environment:
      NODE_ENV: production
      PUBLIC_API_URL: http://localhost:8001
    depends_on:
      - rust-backend
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M

  nginx:
    image: nginx:alpine
    container_name: bare_metal_nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./nginx/ssl:/etc/nginx/ssl
    depends_on:
      - frontend
      - rust-backend
      - python-services
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:latest
    container_name: bare_metal_prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1G

  grafana:
    image: grafana/grafana:latest
    container_name: bare_metal_grafana
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards
      - ./monitoring/grafana/datasources:/etc/grafana/provisioning/datasources
    environment:
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1G

volumes:
  prometheus_data:
  grafana_data:

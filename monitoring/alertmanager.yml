# Alertmanager configuration for FullStackHex
# Receives alerts from Prometheus and routes them to notification channels.
#
# NOTE: No receivers are configured by default.
# Teams should add their own Slack, PagerDuty, or email receivers.

global:
  # smtp_smarthost: 'localhost:587'
  # smtp_from: 'alerts@example.com'

route:
  group_by: ['alertname', 'severity']
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h
  receiver: 'default'
  routes:
    - match:
        severity: critical
      receiver: 'default'
      continue: true

receivers:
  - name: 'default'
    # Example: uncomment and configure to enable Slack notifications
    # slack_configs:
    #   - api_url: 'https://hooks.slack.com/services/YOUR/WEBHOOK/URL'
    #     channel: '#alerts'
    #     title: '{% raw %}{{ .GroupLabels.alertname }}{% endraw %}'
    #     text: '{% raw %}{{ range .Alerts }}{{ .Annotations.summary }}{{ end }}{% endraw %}'

inhibit_rules:
  - source_match:
      severity: 'critical'
    target_match:
      severity: 'warning'
    equal: ['alertname']

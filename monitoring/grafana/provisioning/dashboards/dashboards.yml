# Grafana dashboard provisioning configuration
# Auto-discovers dashboards on startup

apiVersion: 1

providers:
  - name: 'FullStackHex'
    orgId: 1
    folder: ''
    type: file
    disableDeletion: false
    updateIntervalSeconds: 10
    allowUiUpdates: true
    options:
        path: /var/lib/grafana/dashboards

# Prometheus configuration for FullStackHex
# Scrapes metrics from Rust backend, Python sidecar (via Rust proxy),
# node-exporter, redis_exporter, postgres_exporter, and nginx-exporter.

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitoring: 'fullstackhex'

# Alertmanager configuration
alerting:
  alertmanagers:
    - static_configs:
        - targets:
          - alertmanager:9093

rule_files:
  - 'alerts.yml'

scrape_configs:
  # Rust Backend - Axum metrics endpoint
  - job_name: 'rust-backend'
    scrape_interval: 5s
    static_configs:
      - targets: ['backend:8001']
        labels:
          service: 'rust-api'
          tier: 'backend'
    metrics_path: '/metrics'

  # Python Sidecar - proxied through Rust backend
  - job_name: 'python-sidecar'
    scrape_interval: 10s
    static_configs:
      - targets: ['backend:8001']
        labels:
          service: 'python-api'
          tier: 'backend'
    metrics_path: '/metrics/python'

  # Node Exporter - system metrics
  - job_name: 'node-exporter'
    scrape_interval: 15s
    static_configs:
      - targets: ['node-exporter:9100']
        labels:
          service: 'system'
          tier: 'infrastructure'

  # Redis Exporter
  - job_name: 'redis'
    scrape_interval: 15s
    static_configs:
      - targets: ['redis-exporter:9121']
        labels:
          service: 'redis'
          tier: 'infrastructure'

  # PostgreSQL Exporter
  - job_name: 'postgres'
    scrape_interval: 15s
    static_configs:
      - targets: ['postgres-exporter:9187']
        labels:
          service: 'postgres'
          tier: 'infrastructure'

  # Nginx Exporter (production only)
  - job_name: 'nginx'
    scrape_interval: 15s
    static_configs:
      - targets: ['nginx-exporter:9113']
        labels:
          service: 'nginx'
          tier: 'infrastructure'

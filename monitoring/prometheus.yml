global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'rust-backend'
    static_configs:
      - targets: ['rust-backend:8001']

  - job_name: 'python-services'
    static_configs:
      - targets: ['python-services:8000']

  - job_name: 'frontend'
    static_configs:
      - targets: ['frontend:3001']

  - job_name: 'postgres'
    static_configs:
      - targets: ['postgres:5432']

  - job_name: 'redis'
    static_configs:
      - targets: ['redis:6379']

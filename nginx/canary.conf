# Nginx canary routing — splits traffic between primary and canary backends.
# Change the percentage and reload nginx to adjust canary weight.

split_clients "$request_uri" $backend_upstream {
    10%    canary_backend;
    *     primary_backend;
}

upstream primary_backend {
    server backend:8001;
}

upstream canary_backend {
    server backend-canary:8001;
}

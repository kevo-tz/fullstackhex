# nginx/static.conf
# Minimal config for serving Astro static build output inside Dockerfile.frontend
# The outer nginx.conf (production) proxies to this container on port 4321.

server {
    listen 4321;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Cache static assets aggressively; HTML must revalidate
    location ~* \.(js|css|woff2?|ttf|eot|ico|png|jpg|jpeg|gif|svg|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache";
    }

    # Hide Nginx version
    server_tokens off;
}
